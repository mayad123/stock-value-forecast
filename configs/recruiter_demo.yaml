# Recruiter demo: offline, no API keys. Uses data/sample/ only.
# Run: make demo  OR  python run.py demo  (default config)
# Pipeline: build-features -> train -> backtest (no ingest).

mode: recruiter_demo

tickers:
  symbols: [AAPL, MSFT]

time_horizon:
  train_end: "2024-01-24"
  val_start: "2024-01-25"
  val_end: "2024-01-26"
  test_start: "2024-01-27"

feature_windows:
  lookback_days: 7
  forward_return_days: 1

paths:
  data_raw: "data/sample"
  data_processed: "data/processed"
  models: "models"
  reports: "reports"

feature_build:
  raw_dataset_version: "demo"

train:
  processed_version: "latest"
eval:
  processed_version: "latest"
  min_train_days: 5
  fold_size_days: 10
  step_size_days: 10

training:
  epochs: 3
  batch_size: 8
  learning_rate: 0.001
  validation_split: 0.2
  early_stopping_patience: 2

use_news: false
