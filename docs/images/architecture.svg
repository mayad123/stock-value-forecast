<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" font-family="system-ui, sans-serif" font-size="12">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#555"/>
    </marker>
  </defs>
  <!-- Stages -->
  <rect x="8" y="32" width="92" height="40" rx="5" fill="#e8f4f8" stroke="#2a7a9a" stroke-width="1.2"/>
  <text x="54" y="54" text-anchor="middle">AlphaVantage</text>
  <text x="54" y="68" text-anchor="middle">/ sample CSVs</text>

  <rect x="118" y="32" width="72" height="40" rx="5" fill="#f5f5f5" stroke="#555" stroke-width="1.2"/>
  <text x="154" y="57" text-anchor="middle">Ingest</text>

  <rect x="208" y="32" width="92" height="40" rx="5" fill="#f5f5f5" stroke="#555" stroke-width="1.2"/>
  <text x="254" y="57" text-anchor="middle">Feature build</text>

  <rect x="318" y="32" width="72" height="40" rx="5" fill="#f5f5f5" stroke="#555" stroke-width="1.2"/>
  <text x="354" y="57" text-anchor="middle">Train</text>

  <rect x="408" y="32" width="80" height="40" rx="5" fill="#f5f5f5" stroke="#555" stroke-width="1.2"/>
  <text x="448" y="57" text-anchor="middle">Backtest</text>

  <rect x="506" y="32" width="88" height="40" rx="5" fill="#e8f0e8" stroke="#2a6a2a" stroke-width="1.2"/>
  <text x="550" y="57" text-anchor="middle">FastAPI Serve</text>

  <rect x="612" y="32" width="88" height="40" rx="5" fill="#eee8f0" stroke="#5a4a6a" stroke-width="1.2"/>
  <text x="656" y="57" text-anchor="middle">Streamlit UI</text>

  <!-- Arrows -->
  <line x1="100" y1="52" x2="115" y2="52" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="190" y1="52" x2="205" y2="52" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="300" y1="52" x2="315" y2="52" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="390" y1="52" x2="405" y2="52" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="488" y1="52" x2="503" y2="52" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="594" y1="52" x2="609" y2="52" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Artifacts (below) -->
  <text x="254" y="108" text-anchor="middle" fill="#555" font-size="10">data/processed/&lt;version&gt;</text>
  <text x="354" y="108" text-anchor="middle" fill="#555" font-size="10">models/ run_record.json</text>
  <text x="448" y="108" text-anchor="middle" fill="#555" font-size="10">reports/ metrics</text>
  <text x="550" y="108" text-anchor="middle" fill="#555" font-size="10">/predict /model_info</text>
</svg>
